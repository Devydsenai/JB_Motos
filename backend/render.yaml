# Blueprint Render — JB Motos API
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: jb-motos-api
    runtime: node
    region: virginia
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: MERCADO_PAGO_SANDBOX
        value: "false"
      - key: N8N_CLIENT_ASSISTANT_URL
        sync: false
      - key: N8N_ADMIN_ASSISTANT_URL
        sync: false
